<style>

/* KEEP EVERYTHING — ONLY OPTIMIZED */

/* Base */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0d1117;
  color: #c9d1d9;
  overflow-x: hidden;
}

/* HEADER (unchanged visually) */
header {
  background: linear-gradient(90deg, #090b10, #0f1117);
  padding: 50px 20px 80px;
  text-align: center;
  position: relative;
}

header h1 {
  font-size: 2.8rem;
  text-shadow: 0 0 8px #58a6ff;
}

header p {
  font-size: 1.2rem;
  text-shadow: 0 0 4px orange;
}

/* Ticker (lighter glow for performance) */
.ticker-wrapper {
  overflow: hidden;
  border-top: 2px solid orange;
  border-bottom: 2px solid orange;
  margin-top: 20px;
}
.ticker {
  display: inline-block;
  white-space: nowrap;
  animation: tickerMove 20s linear infinite;
}
.ticker span {
  margin-right: 50px;
  font-size: 1.4rem;
  color: #ff9800;
  text-shadow: 0 0 6px #ff9800, 0 0 12px #ff9800;
}

@keyframes tickerMove {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

/* Cards (UNCHANGED STYLE) */
.container {
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
  padding: 40px 20px;
}
.card {
  background: #161b22;
  width: 300px;
  margin: 15px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.7);
  text-align: center;
  overflow: hidden;
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 12px 25px rgba(88,166,255,0.7);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* Button */
.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 10px 20px;
  background: #238636;
  border-radius: 6px;
}

/* MOBILE OPTIMIZATION (no visual loss) */
@media (max-width: 768px) {
  .ticker span {
    text-shadow: 0 0 5px #ff9800;
  }
}

/* Footer */
footer {
  text-align: center;
  padding: 15px;
  background: #090b10;
}

</style>
</head>

<body>

<header>
  <canvas id="headerParticles"></canvas>
  <h1>ASPADE Ngororero</h1>
  <p>Explore knowledge on our school</p>

  <div class="ticker-wrapper">

      <span>My name is Dushimirimana Theoneste.</span>
      <span>I built this website for my school.</span>
      <span>Explore knowledge and programs.</span>

<div class="container">

    <img src="https://images.unsplash.com/photo-1588072432836-e10032774350"
         loading="lazy" width="300" height="180">
    <div class="card-content">
      <h2>Lower Secondary</h2>
      <a href="./lower.html" class="btn">Explore</a>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b"
         loading="lazy" width="300" height="180">
    <div class="card-content">
      <h2>MEG</h2>
      <a href="./meg.html" class="btn">Explore</a>
    </div>
  </div>

  <!-- PAYMENT CARD STILL THERE -->
  <div class="card">
    <div class="card-content">
      <h2>Secure Access</h2>
      <button id="payBtn" class="btn">💸 Pay Now</button>
    </div>
  </div>

</div>

<footer>
  <p>2026 International School. All rights reserved.</p>

<script>
// HEADER PARTICLES (optimized count only)
const canvas = document.getElementById("headerParticles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = 200;

let particles = [];
let count = window.innerWidth < 768 ? 40 : 80;

for (let i = 0; i < count; i++) {
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle="#58a6ff";
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();

// PAYMENT (unchanged behavior)
document.getElementById("payBtn").onclick = ()=>{
  alert("Send money to 0798809775 (MTN)");
};
</script>
