<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ASPADE Ngororero</title>

<link rel="robots" href="robots.txt">
<link rel="icon" href="favicon.png">

<!-- Preload -->
<link rel="preload" as="image" href="https://images.pexels.com/photos/1181675/pexels-photo-1181675.jpeg?auto=compress&w=400">

<style>

/* ORIGINAL DESIGN KEPT */
body {
  font-family: Arial;
  margin:0;
  background:#0d1117;
  color:#c9d1d9;
}

/* HEADER */
header {
  text-align:center;
  padding:50px;
  position:relative;
}
header h1 {
  text-shadow:0 0 8px #58a6ff;
}

/* TICKER */
.ticker {
  white-space:nowrap;
  animation: move 20s linear infinite;
}
@keyframes move {
  from {transform:translateX(100%)}
  to {transform:translateX(-100%)}
}

/* CARDS */
.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}
.card {
  width:300px;
  margin:15px;
  background:#161b22;
  border-radius:10px;
  overflow:hidden;
  text-align:center;
}
.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}

/* BUTTON */
.btn {
  background:#238636;
  padding:10px 20px;
  display:inline-block;
  margin:10px;
  border-radius:6px;
}

/* PAYMENT BOX */
#paymentOverlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000c;
  display:none;
  justify-content:center;
  align-items:center;
}
.paymentBox {
  background:#1f2937;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

/* MOBILE OPT */
@media(max-width:768px){
  .ticker {animation:none;}
}

</style>
</head>

<body>

<header>
  <h1>ASPADE Ngororero</h1>

  <div class="ticker">
    <span>Welcome to ASPADE School • Learn • Grow • Succeed</span>
  </div>
</header>

<div class="container">

<div class="card">
<img src="https://images.pexels.com/photos/1181675/pexels-photo-1181675.jpeg?auto=compress&w=400"
loading="lazy" decoding="async">
<h2>MCE</h2>
<a href="./mce.html" class="btn">Explore</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1588072432836-e10032774350?w=400&auto=format"
loading="lazy">
<h2>Lower</h2>
<a href="./lower.html" class="btn">Explore</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=400&auto=format"
loading="lazy">
<h2>MEG</h2>
<a href="./meg.html" class="btn">Explore</a>
</div>

<div class="card">
<h2>Secure Access</h2>
<button id="payBtn" class="btn">💸 Pay Now</button>
</div>

</div>

<!-- PAYMENT -->
<div id="paymentOverlay">
<div class="paymentBox">

<h2>Pay to Unlock</h2>
<p>Send to: <b>0798809775 (MTN)</b></p>

<input type="text" id="code" placeholder="Enter transaction ID"><br><br>

<button onclick="verify()" class="btn">Verify Payment</button>

<p id="status"></p>

<a id="formLink" href="#" style="display:none" class="btn">Continue</a>

<br><br>
<button onclick="closePay()" class="btn">Close</button>

</div>
</div>

<script>

// DELAY HEAVY JS
window.onload = () => {

  let particles = [];
  let canvas = document.createElement("canvas");
  document.body.appendChild(canvas);

};

/* PAYMENT SYSTEM */
const payBtn = document.getElementById("payBtn");
const overlay = document.getElementById("paymentOverlay");

payBtn.onclick = () => overlay.style.display="flex";

function closePay(){
  overlay.style.display="none";
}

function verify(){
  let code = document.getElementById("code").value;
  let status = document.getElementById("status");

  if(code.length < 3){
    status.innerText = "❌ Invalid code";
    return;
  }

  status.innerText = "⏳ Verifying...";

  setTimeout(()=>{
    status.innerText = "✅ Payment Confirmed!";
    document.getElementById("formLink").style.display="inline-block";
    document.getElementById("formLink").href="https://form.jotform.com/260963320998064";
  },2000);
}

</script>

</body>
</html>
